name: Ubuntu Canary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-canary
    steps:
      - name: Boot timing summary
        run: systemd-analyze

      - name: Boot blame (per-unit)
        run: systemd-analyze blame

      - name: Boot critical chain
        run: systemd-analyze critical-chain

      - name: man-db service unit file
        run: systemctl cat man-db.service 2>/dev/null || echo "not found"

      - name: man-db trigger info
        run: |
          systemctl show man-db.service --property=WantedBy,RequiredBy,TriggeredBy,After,Before,Wants
          echo "---"
          ls -la /var/lib/man-db/auto-update 2>/dev/null || echo "no auto-update flag"
          echo "---"
          systemctl list-dependencies man-db.service --reverse

      - name: man-db auto-update debconf
        run: debconf-show man-db | grep auto-update

      - name: man-db journal
        run: journalctl -u man-db.service -b --no-pager

      - name: man-db cache stats
        run: |
          ls -la /var/cache/man/
          find /usr/share/man -name "*.gz" | wc -l
          stat /var/cache/man/index.db 2>/dev/null || echo "no pre-built cache"

      - name: Docker service unit and drop-ins
        run: systemctl cat docker.service

      - name: Docker service dependencies
        run: systemctl show docker.service --property=After,Before,Wants,Requires,TriggeredBy

      - name: Docker journal
        run: journalctl -u docker.service -b --no-pager

      - name: Containerd journal
        run: journalctl -u containerd.service -b --no-pager

      - name: Docker daemon config
        run: cat /etc/docker/daemon.json 2>/dev/null || echo "no daemon.json"

      - name: Docker version and info
        run: |
          docker version
          docker info 2>&1 | head -50
